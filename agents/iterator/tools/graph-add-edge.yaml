name: graph-add-edge
description: Create a typed relationship between two nodes in the knowledge graph
version: 1.0.0
input_schema:
  type: object
  properties:
    sourceId:
      type: string
      description: ID of the source node
    targetId:
      type: string
      description: ID of the target node
    type:
      type: string
      description: Relationship type between source and target
      enum:
        - INSPIRED_BY
        - ITERATED_FROM
        - COMBINES
        - SCAMPER_OF
        - CONTRADICTS
        - SIMILAR_TO
        - USES_CONCEPT
  required: [sourceId, targetId, type]
output_schema:
  type: object
  properties:
    edgeId:
      type: string
      description: Unique identifier of the created edge
    sourceId:
      type: string
      description: Source node ID
    targetId:
      type: string
      description: Target node ID
    type:
      type: string
      description: Relationship type that was created
