name: graph-add-node
description: Add a node to the knowledge graph (Idea, Concept, or Domain)
version: 1.0.0
input_schema:
  type: object
  properties:
    type:
      type: string
      description: Node type to create
      enum: [Idea, Concept, Domain]
    title:
      type: string
      description: Display title for the node
    description:
      type: string
      description: Detailed description of the node content
    method:
      type: string
      description: Creative method or source that produced this node (e.g. brainstorm, SCAMPER, TRIZ)
    userId:
      type: string
      description: Owner user ID. Defaults to current session user if omitted.
  required: [type, title, description, method]
output_schema:
  type: object
  properties:
    nodeId:
      type: string
      description: Unique identifier of the created node
    type:
      type: string
      description: Node type that was created
    title:
      type: string
      description: Title of the created node
    createdAt:
      type: string
      description: ISO 8601 timestamp of creation
